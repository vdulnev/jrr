name: jrr_f
description: JRiver Remote — control JRiver Media Center via MCWS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  auto_route: ^11.1.0

  # DI
  get_it: ^9.2.1

  # Functional
  fpdart: ^1.2.0

  # Logging
  talker: ^5.1.16
  talker_flutter: ^5.1.16
  talker_dio_logger: ^5.1.16

  # Models / unions
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # HTTP
  dio: ^5.9.2

  # Local DB
  drift: ^2.31.0
  drift_flutter: ^0.2.8

  # Prefs / secure storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

  # Code generation
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  auto_route_generator: ^10.4.0
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
