name: Build & Release

on:
  push:
    tags:
      - '*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: jrr_f/build/app/outputs/flutter-apk/app-release.apk
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: jrr_f/build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Archive Release
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath JRiverRemote-Windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: jrr_f/JRiverRemote-Windows.zip

  # build-macos:
  #   runs-on: macos-latest
  #   defaults:
  #     run:
  #       working-directory: jrr_f
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: subosito/flutter-action@v2
  #       with:
  #         channel: 'stable'
  #         cache: true
  #     - run: flutter pub get
  #     - run: flutter build macos --release
  #       env:
  #         CODE_SIGNING_REQUIRED: NO
  #         CODE_SIGNING_ALLOWED: NO
  #     - name: Archive Release
  #       run: |
  #         cd build/macos/Build/Products/Release
  #         zip -r ../../../../JRiverRemote-macOS.zip *.app
  #     - name: Upload artifact
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: macos
  #         path: jrr_f/JRiverRemote-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config libsecret-1-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Archive Release
        run: |
          tar -czvf JRiverRemote-Linux.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: jrr_f/JRiverRemote-Linux.tar.gz

  release:
    needs: [build-android, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/android-aab/app-release.aab
            artifacts/windows/JRiverRemote-Windows.zip
            artifacts/macos/JRiverRemote-macOS.zip
            artifacts/linux/JRiverRemote-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
