name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3                                                                                                                                                                                                           
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            jrr_f/build/app/outputs/flutter-apk/app-release.apk
            jrr_f/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Archive Release
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath JRiverRemote-Windows.zip
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: jrr_f/JRiverRemote-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Archive Release
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../JRiverRemote-macOS.zip *.app
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: jrr_f/JRiverRemote-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jrr_f
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Archive Release
        run: |
          tar -czvf JRiverRemote-Linux.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: jrr_f/JRiverRemote-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
